name: CI
on: [push]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python
        run: cd python && python -m unittest || true

      - name: Go
        run: cd go && go test ./... || true

      - name: C
        run: cd c && make || true

      - name: C#
        run: cd csharp && dotnet build || true
